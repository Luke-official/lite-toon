name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run lint

  integration:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start demo server
        run: npm run start -w @lite-toon/demo &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 --timeout 120000

      - run: npm run test:api -w @lite-toon/demo
      - run: npm run test:oauth -w @lite-toon/demo
      - run: npm run test:mcp -w @lite-toon/demo
